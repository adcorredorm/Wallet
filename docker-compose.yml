services:
  # PostgreSQL Database Service
  # Version: PostgreSQL 15 (Alpine for minimal size)
  # Provides persistent data storage for the Wallet application
  # Production configuration: DB port not exposed externally
  db:
    image: postgres:15-alpine
    container_name: wallet_postgres
    environment:
      # Database configuration
      POSTGRES_DB: ${DB_NAME:-wallet_db}
      POSTGRES_USER: ${DB_USER:-wallet_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wallet_password}
      # PostgreSQL timezone
      PGTZ: UTC
      # Production-grade persistence settings
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB"
    ports: []
    volumes:
      # Persistent volume for database data
      - postgres_data:/var/lib/postgresql/data
      # Alembic migrations for initialization
      - ./backend/alembic:/docker-entrypoint-initdb.d
    networks:
      - wallet_network
    healthcheck:
      # Check if PostgreSQL is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wallet_user} -d ${DB_NAME:-wallet_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    # Security: Use read-only tmpfs for /tmp
    tmpfs:
      - /tmp
      - /run
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Flask Backend API Service
  # Production configuration: gunicorn WSGI server, no source code mounts
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: wallet-backend:latest
    container_name: wallet_backend
    environment:
      # Flask configuration
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-production}

      # Database connection
      DATABASE_URL: postgresql://${DB_USER:-wallet_user}:${DB_PASSWORD:-wallet_password}@db:5432/${DB_NAME:-wallet_db}
      SQLALCHEMY_DATABASE_URI: postgresql://${DB_USER:-wallet_user}:${DB_PASSWORD:-wallet_password}@db:5432/${DB_NAME:-wallet_db}

      # Application settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}

      # CORS configuration for frontend communication
      FLASK_CORS_ORIGINS: ${FLASK_CORS_ORIGINS:-http://localhost:3000,http://frontend:80}

      # Authentication & Authorization
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
    ports: []
    volumes: []
    depends_on:
      # Wait for database to be healthy before starting
      db:
        condition: service_healthy
    networks:
      - wallet_network
    healthcheck:
      # Check app health using Python urllib (no external tool dependency)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    # Production command: gunicorn WSGI server
    command: >
      gunicorn
      --bind 0.0.0.0:5000
      --workers 2
      --worker-class sync
      --timeout 60
      --access-logfile -
      --error-logfile -
      run:app

  # Vue.js Frontend Service
  # Production configuration: compiled SPA served via Nginx, static files baked in
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    image: wallet-frontend:latest
    container_name: wallet_frontend
    ports:
      # Expose Nginx on port 3000 (host accessible, compatible with dev)
      - "3000:80"
    depends_on:
      # Wait for backend to be ready
      backend:
        condition: service_healthy
    networks:
      - wallet_network
    environment:
      # Frontend environment variables
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}

      # Google OAuth Client ID for frontend authentication
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    healthcheck:
      # Check if Nginx is serving the application (no external tools)
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 10s
    restart: always
    # Security: Read-only filesystem for production hardening
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    # Production resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Daily Exchange Rates Cron Sidecar
  # Lightweight container that updates exchange rates once per day
  # Reuses the same backend image - no new build required
  rates_cron:
    image: wallet-backend:latest
    container_name: wallet_rates_cron
    environment:
      DATABASE_URL: postgresql://${DB_USER:-wallet_user}:${DB_PASSWORD:-wallet_password}@db:5432/${DB_NAME:-wallet_db}
      SQLALCHEMY_DATABASE_URI: postgresql://${DB_USER:-wallet_user}:${DB_PASSWORD:-wallet_password}@db:5432/${DB_NAME:-wallet_db}
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-production}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    networks:
      - wallet_network
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    command: >
      sh -c "
        echo 'Starting exchange rates cron service (daily updates)' &&
        while true; do
          echo '[Rates Cron] Running flask rates update at '$(date)'' &&
          flask rates update 2>&1 || echo '[Rates Cron] Rate fetch failed, will retry in 24h' &&
          echo '[Rates Cron] Sleeping for 24 hours' &&
          sleep 86400;
        done
      "

  # Optional: pgAdmin for database management (disabled by default in production)
  # Only runs when explicitly enabled with: docker compose --profile dev up
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wallet_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@wallet.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports: []
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wallet_network
    restart: unless-stopped
    # Disabled by default in production; enable with: docker compose --profile dev up
    profiles: [dev]

# Docker networks for service communication
networks:
  wallet_network:
    driver: bridge

# Docker volumes for data persistence
volumes:
  # PostgreSQL data persistence - named volume for easy management
  # Data survives container restarts and removes
  postgres_data:
    driver: local
  # pgAdmin configuration persistence
  pgadmin_data:
    driver: local
