<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- PLACEHOLDER MASKABLE ICON — Replace with a real PNG before production release.
       Maskable icons must keep all important content inside the "safe zone":
       a centered circle with radius = 40% of the icon size (here: r=102px).
       The OS can clip anything outside that circle.
       Generate with: npx pwa-asset-generator logo.svg public/icons --maskable
       Colors match the project's dark theme from tailwind.config.js:
         background: #0f172a (dark.bg.primary / slate-900)
         accent:     #3b82f6 (accent.blue)
         text:       #f1f5f9 (dark.text.primary)
  -->
  <!-- Full bleed background — critical for maskable icons, must fill entire canvas -->
  <rect width="512" height="512" fill="#0f172a"/>
  <!-- Wallet body — kept inside safe zone (r=102 from center 256,256) -->
  <rect x="148" y="198" width="216" height="136" rx="18" fill="#1e293b" stroke="#334155" stroke-width="3"/>
  <!-- Wallet flap / card slot -->
  <rect x="148" y="198" width="216" height="48" rx="18" fill="#334155"/>
  <!-- Coin accent — centered in lower portion of safe zone -->
  <circle cx="314" cy="282" r="36" fill="#3b82f6"/>
  <text x="314" y="296" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="#f1f5f9">$</text>
</svg>
