version: '3.8'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# This file overrides development settings with production-optimized configurations

services:
  # Production database configuration
  db:
    # Remove port mapping in production - only allow backend access
    ports: []

    # Production-grade persistence settings
    environment:
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB"

    # Tighter health checks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wallet_user} -d ${DB_NAME:-wallet_db}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Always restart in production
    restart: always

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Production backend configuration
  backend:
    # Rebuild from source in production or use pre-built image
    image: wallet-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile

    # Remove development ports and volumes
    ports: []
    volumes: []

    environment:
      # Production Flask settings
      FLASK_ENV: production
      DEBUG: "False"
      # Use gunicorn or uWSGI for production (override command)

    # Always restart
    restart: always

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Use gunicorn for production WSGI server
    command: >
      gunicorn
      --bind 0.0.0.0:5000
      --workers 4
      --worker-class sync
      --timeout 60
      --access-logfile -
      --error-logfile -
      run:app

    # Healthcheck with longer timeout for production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Production frontend configuration
  frontend:
    image: wallet-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile

    # Remove all ports for reverse proxy setup
    ports: []

    # No volumes in production - static files baked in
    volumes: []

    # Enable read-only filesystem for security
    read_only: true

    # Writable tmpfs for nginx
    tmpfs:
      - /var/cache/nginx
      - /var/run
    - /tmp

    # Always restart
    restart: always

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

    # Tighter healthchecks
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 10s

  # Disable pgAdmin in production
  pgadmin:
    profiles: [disabled]

