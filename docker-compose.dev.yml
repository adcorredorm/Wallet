version: '3.8'

# Development Overlay for Docker Compose
# This file converts the production-ready base configuration into a development environment
# with hot reload, debug mode, and dev tools.
#
# Usage:
#   Development with hot reload: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production (no overlay needed):  docker compose up -d
#
# The compose file merges, so base services are inherited and overridden by these settings

services:
  # Database service - expose port for development tools (psql, pgAdmin)
  db:
    ports:
      # Expose PostgreSQL port for local development connections
      - "${DB_PORT:-5432}:5432"
    # Development doesn't need production resource limits
    deploy:
      resources: {}
    healthcheck:
      # More relaxed checks for development (faster startup)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend Flask API Service with hot reload
  backend:
    # Override production image/build to use local source code
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Don't use pre-built image; build from local source
    image: null

    # Expose Flask development server port for external debugging
    ports:
      # Flask development server
      # Map to 5001 because 5000 is used by macOS AirPlay
      - "5001:5000"

    # Mount application code for hot reload
    volumes:
      # Mount backend source code for auto-reload
      - ./backend:/app
      # Exclude these directories to avoid volume sync issues
      - /app/__pycache__
      - /app/.pytest_cache
      - /app/venv
      - /app/.pip_cache

    environment:
      # Development Flask settings
      FLASK_ENV: development
      DEBUG: "True"
      # CORS accepts multiple URLs in development
      FLASK_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://frontend:80"

    # Relaxed health checks for development (dev server slower)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    # No production resource limits in dev
    deploy:
      resources: {}

    # Override production command: flask run with auto-reload
    command: >
      sh -c "
        echo 'Starting backend in development mode...' &&
        echo 'Waiting for database to be healthy...' &&
        sleep 3 &&
        flask db upgrade &&
        echo 'Running Flask with auto-reload enabled' &&
        flask run --host=0.0.0.0 --reload
      "

  # Frontend Vue.js Application with Vite Dev Server (HMR)
  frontend:
    # Build using development Dockerfile with Vite dev server
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      # Dockerfile.dev runs `npm ci` during build for Linux-compatible binaries
    # Use dev-specific image (Node.js + Vite) instead of production Nginx image
    image: wallet-frontend-dev:latest

    # Disable read-only filesystem (production hardening) — Vite needs to write temp files
    read_only: false

    # Override production Nginx with Vite dev server
    # Port mapping for development access
    ports:
      # Vite dev server with Hot Module Replacement (HMR)
      - "5173:5173"
      # Secondary fallback port
      - "5174:5174"
      # Legacy port mapping for backwards compatibility
      # - "3000:5173"

    # Mount only source files needed for hot reload
    # IMPORTANT: package.json changes require rebuilding the image:
    #   docker compose build frontend
    # This is necessary because node_modules comes from the Docker image, not a host volume
    volumes:
      # Source code for live reload (Vue components, utilities, stores)
      - ./frontend/src:/app/src
      # Public static assets
      - ./frontend/public:/app/public
      # Entry point template
      - ./frontend/index.html:/app/index.html
      # Build and dev server configuration
      - ./frontend/vite.config.js:/app/vite.config.js
      # TypeScript configuration
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      # Styling configuration
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js

    environment:
      # Vite HMR configuration for WebSocket connection from browser
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: 5173
      VITE_HMR_PROTOCOL: ws

      # API base URL for frontend to reach backend
      # Use relative path so requests go through Vite proxy (/api/* → backend:5000)
      # An absolute URL would bypass proxy and cause CORS errors
      VITE_API_BASE_URL: /api/v1

      # Vite proxy target: backend service via Docker internal DNS
      # Vite proxy runs inside container, so use service name (backend:5000)
      # not host port mapping (localhost:5001)
      BACKEND_URL: http://backend:5000

      # Google OAuth Client ID for frontend
      VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}

      # Frontend-specific environment
      NODE_ENV: development

    # Adapted health check for Vite dev server
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    # No production resource limits in dev
    deploy:
      resources: {}

    # Override production Nginx with Vite dev server
    command: npm run dev -- --host 0.0.0.0 --port 5173

  # pgAdmin Database Management UI - enabled by default in development
  pgadmin:
    ports:
      # pgAdmin web UI accessible at http://localhost:5050
      - "5050:80"
    # Enable by default in development (empty profiles list overrides base)
    profiles: []

# Development networks (inherited from base, can be customized)
networks:
  wallet_network:
    driver: bridge
